name: Build CarlosOS ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap build-essential

    - name: Prepare Build Environment
      run: |
        # Make scripts executable
        chmod +x *.sh
        
        # Install images
        bash install_images.sh

    - name: Patch live-build linux-image lookup (overwrite installed script)
      run: |
        # Some live-build versions call the installed lb_chroot_linux-image script directly.
        # Find the installed script path and replace it with a no-op stub so the runner doesn't fail
        # when a mirror does not provide Contents-amd64.gz.
        set -e
        LB_PATH="$(dpkg -L live-build 2>/dev/null | grep -E 'lb_chroot_linux-image$' || true)"
        if [ -n "$LB_PATH" ]; then
          sudo bash -lc "printf '%s\n' '#!/bin/sh' '# stub: skip Contents-amd64.gz lookup' 'exit 0' > '$LB_PATH'"
          sudo chmod +x "$LB_PATH"
          echo "Replaced installed lb_chroot_linux-image at $LB_PATH"
        else
          echo "lb_chroot_linux-image not found via dpkg -L; creating /usr/local/bin stub instead"
          sudo bash -lc "printf '%s\n' '#!/bin/sh' '# stub: skip Contents-amd64.gz lookup' 'exit 0' > /usr/local/bin/lb_chroot_linux-image"
          sudo chmod +x /usr/local/bin/lb_chroot_linux-image
        fi

    - name: Build ISO
      env:
        DEBOOTSTRAP_OPTIONS: "--no-check-gpg"
      run: |
        # Clean any possible old build
        sudo lb clean --purge
        
        # Run the build
        sudo bash build_carlosos.sh

    - name: Rename ISO (if needed)
      run: |
        # Ensure we capture the resulting ISO. Sometimes lb build outputs a different name.
        if [ -f carlosos-live-1.0-amd64.hybrid.iso ]; then
           echo "ISO found!"
        else
           mv live-image-amd64.hybrid.iso carlosos-live-1.0-amd64.hybrid.iso || true
        fi

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarlosOS-Live-Light-1.0
        path: carlosos-live-1.0-amd64.hybrid.iso
        retention-days: 5
