name: Build CarlosOS ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap build-essential

    - name: Prepare Build Environment
      run: |
        # Make scripts executable
        chmod +x *.sh
        
        # Install images
        bash install_images.sh

    - name: Patch live-build scripts to skip Contents lookup
      run: |
        # Replace any live-build helper that attempts to download Contents-amd64.gz
        # with a no-op stub. This covers both chroot and binary helpers.
        set -e
        # find installed lb scripts that include 'linux' or 'debian-installer' in name
        dpkg -L live-build 2>/dev/null | grep -E '/lb_.*(linux|debian-installer)(-)?' || true | while read -r path; do
          if [ -n "$path" ] && [ -f "$path" ]; then
            echo "Overwriting $path"
            sudo bash -lc "printf '%s\n' '#!/bin/sh' '# stub: skip Contents-amd64.gz lookup' 'exit 0' > '$path'"
            sudo chmod +x "$path"
          fi
        done
        # ensure fallback stubs in /usr/local/bin
        for name in lb_chroot_linux-image lb_binary_linux-image lb_binary_debian-installer lb_chroot_debian-installer; do
          if [ ! -x "/usr/local/bin/$name" ]; then
            sudo bash -lc "printf '%s\n' '#!/bin/sh' '# stub fallback' 'exit 0' > /usr/local/bin/$name"
            sudo chmod +x /usr/local/bin/$name
            echo "Created fallback /usr/local/bin/$name"
          fi
        done

    - name: Build ISO
      env:
        DEBOOTSTRAP_OPTIONS: "--no-check-gpg"
      run: |
        # Clean any possible old build
        sudo lb clean --purge
        
        # Run the build
        sudo bash build_carlosos.sh

    - name: Rename ISO (if needed)
      run: |
        # Ensure we capture the resulting ISO. Sometimes lb build outputs a different name.
        if [ -f carlosos-live-1.0-amd64.hybrid.iso ]; then
           echo "ISO found!"
        else
           mv live-image-amd64.hybrid.iso carlosos-live-1.0-amd64.hybrid.iso || true
        fi

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarlosOS-Live-Light-1.0
        path: carlosos-live-1.0-amd64.hybrid.iso
        retention-days: 5
