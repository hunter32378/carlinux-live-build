# CarlosOS Live - Isolinux Configuration
# Configuración para boot legacy (BIOS)

UI menu.c32
PROMPT 0
MENU TITLE CarlosOS Live 1.0
TIMEOUT 100
DEFAULT carlosos-live

LABEL carlosos-live
  MENU LABEL ^CarlosOS Live (Boot normal)
  MENU DEFAULT
  KERNEL /live/vmlinuz
  APPEND boot=live components quiet splash hostname=carlosos username=user initrd=/live/initrd.img

LABEL carlosos-failsafe
  MENU LABEL CarlosOS Live (Modo ^seguro)
  KERNEL /live/vmlinuz
  APPEND boot=live components nomodeset noapic noapm nodma nomsi nolapic pci=nomsi acpi=off noapic nosmp vga=normal hostname=carlosos username=user initrd=/live/initrd.img

LABEL carlosos-persistent
  MENU LABEL CarlosOS Live (^Persistent)
  KERNEL /live/vmlinuz
  APPEND boot=live components quiet splash persistence hostname=carlosos username=user initrd=/live/initrd.img

LABEL carlosos-forensic
  MENU LABEL CarlosOS Live (Modo ^Forensic)
  KERNEL /live/vmlinuz
  APPEND boot=live components quiet splash noautomount hostname=carlosos username=user initrd=/live/initrd.img

LABEL carlosos-debug
  MENU LABEL CarlosOS Live (^Debug mode)
  KERNEL /live/vmlinuz
  APPEND boot=live components debug hostname=carlosos username=user initrd=/live/initrd.img

LABEL memtest
  MENU LABEL Test de ^memoria (memtest86+)
  KERNEL /live/memtest

LABEL hdt
  MENU LABEL ^Hardware Information (HDT)
  COM32 hdt.c32

LABEL local
  MENU LABEL ^Boot from local drive
  LOCALBOOT 0

LABEL poweroff
  MENU LABEL ^Apagar sistema
  COM32 poweroff.c32

LABEL reboot
  MENU LABEL ^Reiniciar sistema
  COM32 reboot.c32

MENU COLOR BORDER       30;44   #00000000 #00000000 none
MENU COLOR TITLE        36;44   #00BFFFFF #00000000 none
MENU COLOR SEL          30;47   #00000000 #FFFFFFFF none
MENU COLOR UNSEL        37;44   #FFFFFFFF #00000000 none
MENU COLOR HELP         37;44   #FFFFFFFF #00000000 none
MENU COLOR TIMEOUT_MSG  37;44   #FFFFFFFF #00000000 none
MENU COLOR TIMEOUT      30;47   #00000000 #FFFFFFFF none

MENU TABULATED
MENU MARGIN 5 5 5 5
MENU ROWS 12
MENU TABSTOP 3
MENU WIDTH 70
MENU HELP Press ENTER to boot, TAB for options, or wait for automatic boot...

# Background splash (if available)
# MENU BACKGROUND splash.png
