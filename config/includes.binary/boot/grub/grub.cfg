# GRUB Configuration for CarlosOS Live
# Configuración personalizada para CarlosOS

set default=0
set timeout=10

# Enable graphics mode
set gfxmode=auto
set gfxpayload=keep

# Load required modules
load_video
load_font unicode

# Insmod for various filesystems
insmod all_video
insmod font
insmod gettext
insmod png
insmod jpeg

# Set theme (if available)
if [ -e /boot/grub/themes/carlosos/theme.txt ]; then
    set theme=/boot/grub/themes/carlosos/theme.txt
fi

# Background image (if available)
if background_image /boot/grub/background.png; then
    set color_normal=white/black
    set color_highlight=black/light-blue
elif background_image /isolinux/splash.png; then
    set color_normal=white/black
    set color_highlight=black/light-blue
else
    set color_normal=white/black
    set color_highlight=black/light-blue
fi

# Menu entries
menuentry "CarlosOS Live (Boot normal)" --class carlosos --class gnu-linux --class gnu --class os {
    linux /live/vmlinuz boot=live components quiet splash hostname=carlosos username=user
    initrd /live/initrd.img
}

menuentry "CarlosOS Live (Modo seguro / Failsafe)" --class carlosos --class gnu-linux --class gnu --class os {
    linux /live/vmlinuz boot=live components nomodeset noapic noapm nodma nomsi nolapic pci=nomsi acpi=off noapic nosmp vga=normal hostname=carlosos username=user
    initrd /live/initrd.img
}

menuentry "CarlosOS Live (Persistent)" --class carlosos --class gnu-linux --class gnu --class os {
    linux /live/vmlinuz boot=live components quiet splash persistence hostname=carlosos username=user
    initrd /live/initrd.img
}

menuentry "CarlosOS Live (Forensic mode)" --class carlosos --class gnu-linux --class gnu --class os {
    linux /live/vmlinuz boot=live components quiet splash noautomount hostname=carlosos username=user
    initrd /live/initrd.img
}

menuentry "CarlosOS Live (Debug mode)" --class carlosos --class gnu-linux --class gnu --class os {
    linux /live/vmlinuz boot=live components debug hostname=carlosos username=user
    initrd /live/initrd.img
}

menuentry "Test de memoria (memtest86+)" --class memtest {
    linux /live/memtest
}

menuentry "Apagar sistema" --class shutdown {
    halt
}

menuentry "Reiniciar sistema" --class restart {
    reboot
}

# Submenu for advanced options
submenu "Opciones avanzadas..." {
    menuentry "CarlosOS Live (Text mode)" {
        linux /live/vmlinuz boot=live components quiet hostname=carlosos username=user text
        initrd /live/initrd.img
    }
    
    menuentry "CarlosOS Live (No DRM)" {
        linux /live/vmlinuz boot=live components quiet splash nomodeset hostname=carlosos username=user
        initrd /live/initrd.img
    }
}
